<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Layered diamond/prism shape matching the header logo -->
  <g transform="translate(256, 240)">
    <!-- Bottom layer -->
    <path d="M0 80 L-120 20 L0 -40 L120 20 Z" fill="none" stroke="#64748b" stroke-width="16" stroke-linejoin="round" opacity="0.5"/>
    <!-- Middle layer -->
    <path d="M0 40 L-120 -20 L0 -80 L120 -20 Z" fill="none" stroke="#94a3b8" stroke-width="16" stroke-linejoin="round" opacity="0.75"/>
    <!-- Top layer -->
    <path d="M0 0 L-120 -60 L0 -120 L120 -60 Z" fill="none" stroke="url(#shape)" stroke-width="18" stroke-linejoin="round"/>
  </g>
</svg>
